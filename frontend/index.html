<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will It Rain?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Will It <span>Rain?</span></h1>

    <div class="lang-toggle">
      <button id="lang-en" onclick="setLang('en')">EN</button>
      <span>|</span>
      <button id="lang-pt" onclick="setLang('pt')">PT</button>
    </div>

    <p class="subtitle">Check if you need an umbrella for your trip</p>

    <div class="form-group">
      <label for="origin">Origin</label>
      <input type="text" id="origin" placeholder="e.g. Campinas, São Paulo">
    </div>

    <div class="form-group">
      <label for="destination">Destination</label>
      <input type="text" id="destination" placeholder="e.g. Guarulhos, São Paulo">
    </div>

    <div class="form-group">
      <label for="departure_time">Departure time (optional)</label>
      <input type="datetime-local" id="departure_time">
    </div>

    <button id="btn">Check</button>

    <p class="error" id="error">Something went wrong. Please try again.</p>

    <div class="result" id="result">
      <div class="verdict" id="verdict"></div>
      <div class="recommendation" id="recommendation"></div>
      <div class="probability" id="probability"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
